<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Transit 預約下車</title>
<style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
    h2 { color: #0078d4; }
    #countdown { font-size: 24px; font-weight: bold; color: #e74c3c; margin: 10px 0; }
    .stop-btn {
        display: block; width: 100%; padding: 15px; margin: 10px 0;
        background: #fff; border: 2px solid #ccc; border-radius: 10px;
        font-size: 18px; font-weight: bold; color: #333;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s;
    }
    .stop-btn:active { background: #e3f2fd; border-color: #0078d4; transform: scale(0.98); }
    .disabled-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column;
        justify-content: center; align-items: center;
    }
</style>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 換成你的 Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDjxGWY6hN4yx-v2pa6I5UItxy_PNaOPK8",
        databaseURL: "https://bus-remote-control-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bus-remote-control"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 🌟 車隊精華：自動從網址抓取車號 (預設為 9527)
    const urlParams = new URLSearchParams(window.location.search);
    const busId = urlParams.get('bus') || "9527"; 

    document.getElementById('bus-title').innerText = `目前車號：${busId}`;

    let timeLeft = 600; // 10分鐘結界
    const timerEl = document.getElementById('countdown');
    const overlay = document.getElementById('timeout-overlay');
    
    const timer = setInterval(() => {
        timeLeft--;
        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;
        timerEl.innerText = `⏳ 網頁有效時間：${min}:${sec.toString().padStart(2, '0')}`;
        if (timeLeft <= 0) { clearInterval(timer); overlay.style.display = 'flex'; }
    }, 1000);

    const container = document.getElementById('stop-list');
    onValue(ref(db, `buses/${busId}/state/upcomingStops`), (snap) => {
        container.innerHTML = '';
        if (snap.exists() && snap.val().length > 0) {
            snap.val().forEach(stopName => {
                let btn = document.createElement('button');
                btn.className = 'stop-btn';
                btn.innerText = `📍 ${stopName}`;
                btn.onclick = () => requestStop(stopName);
                container.appendChild(btn);
            });
        } else {
            container.innerHTML = '<p>即將抵達終點，或尚未發車</p>';
        }
    });

    window.requestStop = function(stopName) {
        if (timeLeft <= 0) return; 
        if(confirm(`確定要在「${stopName}」下車嗎？`)) {
            set(ref(db, `buses/${busId}/requested_stops/${stopName}`), true).then(() => {
                timeLeft = 0; // 消耗通行證
                overlay.querySelector('h1').innerText = "✅ 預約已送出";
                overlay.querySelector('p').innerText = "到站時車廂螢幕將自動提示，請安心休息。";
                overlay.style.display = 'flex';
            }).catch(e => alert("網路錯誤，請稍後再試"));
        }
    };
</script>
</head>
<body>
    <h2>🚌 Smart Transit 預約下車</h2>
    <h4 id="bus-title" style="color:#666; margin-top:-10px;">目前車號：讀取中...</h4>
    <div id="countdown">⏳ 網頁有效時間：10:00</div>
    <div id="stop-list"><p>載入路線中...</p></div>
    <div id="timeout-overlay" class="disabled-overlay">
        <h1 style="color:#e74c3c;">🚫 網頁已失效</h1>
        <p>此網頁連結已過期，若需再次預約請重新感應 NFC。</p>
    </div>
</body>
</html>
