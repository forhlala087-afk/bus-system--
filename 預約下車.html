<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Transit 預約下車</title>
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; padding: 15px; background: #f4f6f9; color: #333; margin: 0; }
    h2 { color: #0056b3; margin-bottom: 5px; }
    .bus-title { font-size: 15px; color: #666; margin-top: 0; margin-bottom: 10px; font-weight: bold; }
    
    /* 倒數計時與進度條樣式 */
    .timer-container { background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #eee; }
    #countdown { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 8px; }
    #progress-bg { width: 100%; background: #e0e0e0; border-radius: 8px; height: 12px; overflow: hidden; }
    #progress-bar { height: 100%; width: 100%; background: #27ae60; transition: width 1s linear, background-color 0.5s ease; }

    .section-title { font-size: 16px; font-weight: bold; text-align: left; margin: 15px 0 10px 5px; color: #444; border-left: 4px solid #0056b3; padding-left: 8px;}
    .section-title.return-trip { border-left-color: #e67e22; color: #e67e22; margin-top: 30px;}

    .stop-btn { display: block; width: 100%; padding: 16px; margin: 8px 0; background: #fff; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; font-weight: bold; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; text-align: left; padding-left: 20px;}
    .stop-btn:active { background: #e3f2fd; border-color: #0078d4; transform: scale(0.98); }
    
    /* 距離過近或不可按的按鈕樣式 */
    .stop-btn.disabled-btn { background: #e9ecef; color: #999; border-color: #dee2e6; cursor: not-allowed; box-shadow: none; }
    
    /* 對向站點樣式 */
    .stop-btn.opposite-btn { border-color: #ffeaa7; background: #fffdf5; }
    .stop-btn.opposite-btn:active { background: #ffeaa7; border-color: #fdcb6e; }

    .disabled-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;}
</style>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjxGWY6hN4yx-v2pa6I5UItxy_PNaOPK8",
        databaseURL: "https://bus-remote-control-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bus-remote-control"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const overlay = document.getElementById('timeout-overlay');
    const lockTitle = document.getElementById('lock-title');
    const lockDesc = document.getElementById('lock-desc');

    // ==========================================
    // 🛡️ 駭客防禦 1：檢查合法憑證
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    let busId = urlParams.get('bus'); 
    const isAdminMode = urlParams.get('admin') === 'true'; 

    const savedBusId = localStorage.getItem('my_active_bus_id');
    const savedLockTime = localStorage.getItem('my_lock_expire');

    // 若網址沒有車號，檢查是否有「未過期的進行中預約」
    if (!busId) {
        if (savedBusId && savedLockTime && Date.now() < parseInt(savedLockTime)) {
            busId = savedBusId; // 持有通行證，恢復連線
        }
    }

    if (!busId) {
        document.getElementById('bus-title').innerText = "連線失敗";
        lockTitle.innerText = "🚫 連結無效";
        lockDesc.innerHTML = "請直接掃描公車椅背上的 QR Code。<br><br><span style='font-size:14px;color:#888;'>(為保護系統，離開公車後連結將自動失效)</span>";
        overlay.style.display = 'flex';
        throw new Error("非法進入，停止執行"); 
    }

    // ==========================================
    // 🛡️ 駭客防禦 2：網址隱形斗篷 (過河拆橋)
    // ==========================================
    if (window.history && window.history.replaceState && urlParams.has('bus')) {
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState(null, document.title, cleanUrl);
    }

    document.getElementById('bus-title').innerText = `目前車號：${busId} ${isAdminMode ? '(管理模式)' : ''}`;

    // ==========================================
    // 🛡️ 駭客防禦 3：檢查是否處於預約鎖定狀態
    // ==========================================
    if (!isAdminMode) {
        const lockTime = localStorage.getItem('my_lock_expire');
        if (lockTime && Date.now() < parseInt(lockTime)) {
            lockTitle.innerText = "⏳ 預約處理中";
            lockTitle.style.color = "#f39c12";
            lockDesc.innerHTML = `您已成功預約下車：<b>${localStorage.getItem('my_locked_stop') || ''}</b><br><br>請留意車廂螢幕提示。<br><br><span style='font-size:14px;color:#888;'>(同一裝置將於到站後自動解除綁定)</span>`;
            overlay.style.display = 'flex';
        }
    }

    // ==========================================
    // ⏳ 絕對時間倒數計時與進度條 (不怕休眠)
    // ==========================================
    const TOTAL_SECONDS = 600; // 10分鐘
    let expireTime = Date.now() + TOTAL_SECONDS * 1000; 
    const timerEl = document.getElementById('countdown');
    const progressBar = document.getElementById('progress-bar');
    
    const timer = setInterval(() => {
        if (overlay.style.display === 'flex' && lockTitle.innerText !== "✅ 預約已送出") return; 
        
        let timeLeft = Math.floor((expireTime - Date.now()) / 1000);
        
        if (timeLeft <= 0) { 
            clearInterval(timer); 
            timerEl.innerText = `⏳ 預約有效時間：0:00`;
            progressBar.style.width = '0%';
            lockTitle.innerText = "⏱️ 逾時已失效";
            lockTitle.style.color = "#e74c3c";
            lockDesc.innerHTML = "您停留在此頁面過久，為防誤觸已自動鎖定。<br>需再次預約請重新掃描。";
            overlay.style.display = 'flex'; 
            return;
        }

        let min = Math.floor(timeLeft / 60); let sec = timeLeft % 60;
        timerEl.innerText = `⏳ 預約有效時間：${min}:${sec.toString().padStart(2, '0')}`;
        
        // 更新進度條顏色與長度
        let percentage = (timeLeft / TOTAL_SECONDS) * 100;
        progressBar.style.width = percentage + '%';
        if (percentage > 50) progressBar.style.background = '#27ae60'; // 綠色
        else if (percentage > 20) progressBar.style.background = '#f1c40f'; // 黃色
        else progressBar.style.background = '#e74c3c'; // 紅色

    }, 1000);

    const container = document.getElementById('stop-list');
    
    // 📡 監聽雲端資料
    onValue(ref(db, `buses/${busId}/state`), (snap) => {
        if (!snap.exists()) {
            container.innerHTML = '<p>車輛尚未發車或無訊號</p>';
            return;
        }

        const state = snap.val();
        let upcoming = state.upcomingStops || [];
        let opposite = state.oppositeStops || [];
        let dist = state.nextStopDist || 0;
        let currentStop = state.currentStop;
        let currentDirText = state.direction === 'outbound' ? '去程' : '返程';
        let oppDirText = state.direction === 'outbound' ? '返程' : '去程';

        // 🌟 智慧解鎖與銷毀通行證
        if (!isAdminMode) {
            let myLockedStop = localStorage.getItem('my_locked_stop');
            let myLockTime = localStorage.getItem('my_lock_expire');

            if (myLockedStop && myLockTime) {
                let isArrivedOrPassed = false;
                if (currentStop === myLockedStop || (!upcoming.includes(myLockedStop) && !opposite.includes(myLockedStop))) {
                    isArrivedOrPassed = true;
                }
                let isExpired = Date.now() > parseInt(myLockTime);

                if (isArrivedOrPassed || isExpired) {
                    // 💣 銷毀通行證：一過站，歷史紀錄的網址就會立刻失效！
                    localStorage.removeItem('my_lock_expire');
                    localStorage.removeItem('my_locked_stop');
                    localStorage.removeItem('my_active_bus_id');
                    
                    if (overlay.style.display === 'flex' && (lockTitle.innerText.includes("處理中") || lockTitle.innerText.includes("預約已送出"))) {
                        lockTitle.innerText = "📍 抵達預約站點";
                        lockTitle.style.color = "#0078d4";
                        lockDesc.innerHTML = "公車已抵達預約站點，任務結束。<br><br>若需預約其他站點，請重新掃描 QR Code。";
                    }
                }
            }
        }

        if (overlay.style.display === 'flex' && !lockTitle.innerText.includes("已解鎖")) return;

        container.innerHTML = '';
        if (upcoming.length === 0 && opposite.length === 0) {
            container.innerHTML = '<p style="color:#888;">車輛待命中，或即將抵達終點</p>';
            return;
        }

        // --- 渲染目前方向站點 (含 500m 防呆) ---
        if (upcoming.length > 0) {
            let title = document.createElement('div');
            title.className = 'section-title';
            title.innerText = `🔵 目前行駛方向 (${currentDirText})`;
            container.appendChild(title);

            upcoming.forEach((stopName, index) => {
                let btn = document.createElement('button');
                btn.className = 'stop-btn';
                
                if (index === 0) {
                    btn.className += ' disabled-btn';
                    btn.innerText = `🚫 ${stopName} (即將抵達/請直接按鈴)`;
                    btn.disabled = true;
                } else if (index === 1) {
                    if (dist > 500) {
                        btn.innerText = `📍 ${stopName}`;
                        btn.onclick = () => requestStop(stopName);
                    } else {
                        btn.className += ' disabled-btn';
                        btn.innerText = `🚫 ${stopName} (距離過近/請直接按鈴)`;
                        btn.disabled = true;
                    }
                } else {
                    btn.innerText = `📍 ${stopName}`;
                    btn.onclick = () => requestStop(stopName);
                }
                container.appendChild(btn);
            });
        }

        // --- 渲染對向(返程)站點 ---
        if (opposite.length > 0) {
            let oppTitle = document.createElement('div');
            oppTitle.className = 'section-title return-trip';
            oppTitle.innerText = `⚪ 對向預約 (${oppDirText})`;
            container.appendChild(oppTitle);

            opposite.forEach((stopName) => {
                let btn = document.createElement('button');
                btn.className = 'stop-btn opposite-btn';
                btn.innerText = `📍 ${stopName}`;
                btn.onclick = () => requestStop(stopName);
                container.appendChild(btn);
            });
        }
    });

    window.requestStop = function(stopName) {
        if (Date.now() > expireTime) return; 
        
        if(confirm(`確定要預約在「${stopName}」下車嗎？`)) {
            set(ref(db, `buses/${busId}/requested_stops/${stopName}`), true).then(() => {
                clearInterval(timer); 
                timerEl.innerText = `⏳ 預約已鎖定`;
                progressBar.style.background = '#bdc3c7'; // 變灰
                
                lockTitle.innerText = "✅ 預約已送出";
                lockTitle.style.color = "#27ae60";
                lockDesc.innerHTML = `您已預約 <b>${stopName}</b><br><br>到站前車廂螢幕將自動閃爍提示，請安心休息。<br><br><span style="font-size:14px;color:#888;">(同一裝置已暫時鎖定)</span>`;
                overlay.style.display = 'flex';
                
                if (!isAdminMode) {
                    // 🎟️ 發放臨時通行證
                    localStorage.setItem('my_lock_expire', Date.now() + 15 * 60 * 1000); 
                    localStorage.setItem('my_locked_stop', stopName); 
                    localStorage.setItem('my_active_bus_id', busId); 
                }
            }).catch(e => alert("網路錯誤，請稍後再試"));
        }
    };
</script>
</head>
<body>
    <h2>🚌 智慧預約下車系統</h2>
    <p class="bus-title" id="bus-title">目前車號：讀取中...</p>
    
    <div class="timer-container">
        <div id="countdown">⏳ 預約有效時間：10:00</div>
        <div id="progress-bg"><div id="progress-bar"></div></div>
    </div>
    
    <div id="stop-list">
        <p>📡 載入最新路線中...</p>
    </div>

    <div id="timeout-overlay" class="disabled-overlay">
        <h1 id="lock-title" style="color:#e74c3c; margin-bottom:10px;">🚫 網頁已失效</h1>
        <p id="lock-desc" style="color:#555; line-height: 1.5; font-size:18px;">此網頁連結已過期。<br>若需再次預約請重新感應。</p>
    </div>
</body>
</html>
